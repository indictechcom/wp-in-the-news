<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News of the Day</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="bi bi-quote"></i> Today's News
            </a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <h1 class="display-4 mb-4">Welcome to In the News Section</h1>
          
                <div class="d-grid gap-3">
                    <button class="btn btn-primary btn-lg" onclick="getNewsOfTheDay()">
                        <i class="bi bi-calendar-check"></i> Get News of the Day
                    </button>
                    <button class="btn btn-warning btn-lg" onclick="toggleDateSearchForm()">
                        <i class="bi bi-calendar-search"></i> Search by Date
                    </button>
                </div>

                <!-- Date Search Form -->
                <div id="dateSearchForm" class="mt-4" style="display: none;">
                    <div class="input-group">
                        <input type="date" id="dateInput" class="form-control">
                        <button class="btn btn-primary" onclick="searchByDate()">Search</button>
                    </div>
                </div>

                <!-- Results will be displayed here -->
                <div id="results" class="mt-4"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
